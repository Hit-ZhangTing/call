<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>通话系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    .sidebar {width: 240px}
    .active-link {font-weight: 600}
    body {background-color: #f8f9fa}
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4"></script>
<script>
const LoginView = {
  template: `
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="mb-3">登录</h3>
            <div v-if="error" class="alert alert-danger">{{ error }}</div>
            <form @submit.prevent="submit">
              <div class="mb-3">
                <label class="form-label">账号</label>
                <input type="text" class="form-control" v-model.trim="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" v-model="password" required>
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="admin" v-model="admin">
                <label class="form-check-label" for="admin">管理员模式</label>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit" :disabled="loading">{{ loading ? '登录中...' : '登录' }}</button>
                <router-link class="btn btn-outline-secondary" to="/register">注册</router-link>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  `,
  data(){
    return { username:'', password:'', admin:false, error:'', loading:false }
  },
  methods:{
    async submit(){
      this.error='';
      this.loading=true;
      try{
        const res = await fetch('/api/login',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:this.username, password:this.password, admin:this.admin})});
        const data = await res.json();
        if(!data.ok){ this.error = data.error || '登录失败'; return; }
        this.$router.push('/dashboard');
      }catch(e){ this.error='网络错误'; }
      finally{ this.loading=false; }
    }
  }
}

const RegisterView = {
  template: `
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="mb-3">注册</h3>
            <div v-if="error" class="alert alert-danger">{{ error }}</div>
            <form @submit.prevent="submit">
              <div class="mb-3">
                <label class="form-label">账号</label>
                <input type="text" class="form-control" v-model.trim="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" v-model="password" required>
              </div>
              <div class="mb-3">
                <label class="form-label">手机号</label>
                <input type="text" class="form-control" v-model="phone">
              </div>
              <div class="mb-3">
                <label class="form-label">邀请码</label>
                <input type="text" class="form-control" v-model="invite">
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit" :disabled="loading">{{ loading ? '注册中...' : '注册' }}</button>
                <router-link class="btn btn-outline-secondary" to="/">返回登录</router-link>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  `,
  data(){
    return { username:'', password:'', phone:'', invite:'', error:'', loading:false }
  },
  methods:{
    async submit(){
      this.error='';
      this.loading=true;
      try{
        const res = await fetch('/api/register',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:this.username, password:this.password, phone:this.phone, invite:this.invite})});
        const data = await res.json();
        if(!data.ok){ this.error = data.error || '注册失败'; return; }
        this.$router.push('/');
      }catch(e){ this.error='网络错误'; }
      finally{ this.loading=false; }
    }
  }
}

const DashboardView = {
  template: `
  <div>
    <nav class="navbar navbar-light bg-light px-3">
      <span class="navbar-brand">工作台</span>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span v-if="user">当前用户：{{ user.username }}（{{ user.role }}）</span>
        <button class="btn btn-outline-secondary btn-sm" @click="logout">退出登录</button>
      </div>
    </nav>
    <div class="d-flex" style="min-height: calc(100vh - 56px)">
      <div class="border-end p-3 sidebar">
        <div class="list-group">
          <a class="list-group-item list-group-item-action" :class="{ 'active-link': tab==='calls' }" href="#" @click.prevent="switchTab('calls')">通话记录表</a>
          <a class="list-group-item list-group-item-action" :class="{ 'active-link': tab==='tasks' }" href="#" @click.prevent="switchTab('tasks')">任务表</a>
          <a class="list-group-item list-group-item-action" :class="{ 'active-link': tab==='scripts' }" href="#" @click.prevent="switchTab('scripts')">话术表</a>
        </div>
      </div>
      <div class="flex-grow-1 p-4">
        <div v-if="tab==='calls'">
          <h5 class="mb-3">通话记录表</h5>
          <div class="table-responsive">
            <table class="table table-striped table-bordered">
              <thead>
                <tr>
                  <th>主叫手机号</th>
                  <th>被叫手机号</th>
                  <th>通话开始时间</th>
                  <th>通话结束时间</th>
                  <th>外呼结果评价</th>
                  <th>存储地址</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="r in data" :key="r.storage">
                  <td>{{ r.caller }}</td>
                  <td>{{ r.callee }}</td>
                  <td>{{ r.start }}</td>
                  <td>{{ r.end }}</td>
                  <td>{{ r.result }}</td>
                  <td>{{ r.storage }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div v-else-if="tab==='tasks'">
          <h5 class="mb-3">任务表</h5>
          <div class="table-responsive">
            <table class="table table-striped table-bordered">
              <thead>
                <tr>
                  <th>被叫手机号</th>
                  <th>姓名</th>
                  <th>性别</th>
                  <th>风险类别</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="r in data" :key="r.phone">
                  <td>{{ r.phone }}</td>
                  <td>{{ r.name }}</td>
                  <td>{{ r.gender }}</td>
                  <td>{{ r.risk }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div v-else>
          <h5 class="mb-3">话术表</h5>
          <div class="table-responsive">
            <table class="table table-striped table-bordered">
              <thead>
                <tr>
                  <th>话术文本</th>
                  <th>话术向量</th>
                  <th>话术类别</th>
                  <th>对话阶段</th>
                  <th>话术分支</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="(r,idx) in data" :key="idx">
                  <td>{{ r.text }}</td>
                  <td>{{ r.vector }}</td>
                  <td>{{ r.category }}</td>
                  <td>{{ r.stage }}</td>
                  <td>{{ r.branch }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  `,
  data(){
    return { user:null, tab:'calls', data:[], loading:false }
  },
  async created(){
    const me = await fetch('/api/me');
    if(me.status===401){ this.$router.push('/'); return; }
    const j = await me.json();
    this.user = j.user;
    this.fetchData();
  },
  methods:{
    async fetchData(){
      this.loading=true;
      let url = '/api/call_logs';
      if(this.tab==='tasks') url = '/api/tasks';
      if(this.tab==='scripts') url = '/api/scripts';
      const res = await fetch(url);
      const j = await res.json();
      this.data = j.data || [];
      this.loading=false;
    },
    switchTab(t){ this.tab=t; this.fetchData(); },
    async logout(){
      await fetch('/api/logout',{method:'POST'});
      this.$router.push('/');
    }
  }
}

const routes = [
  { path: '/', component: LoginView },
  { path: '/register', component: RegisterView },
  { path: '/dashboard', component: DashboardView }
]
const router = VueRouter.createRouter({ history: VueRouter.createWebHashHistory(), routes })

const App = { template: `<router-view></router-view>` }
const app = Vue.createApp(App)
app.use(router)
app.mount('#app')
</script>
</body>
</html>
